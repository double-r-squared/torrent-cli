# Optional local stack for testing torrent-cli: Prowlarr (indexer manager) plus
# qBittorrent (download client), on a shared network so Prowlarr can reach
# qBittorrent by name.
#
#   PUID=$(id -u) PGID=$(id -g) docker compose up -d
#
# Then: open Prowlarr at http://localhost:9696, add an indexer (e.g. LinuxTracker),
# copy the API key (Settings -> General -> Security) into config.toml, and add
# qBittorrent as a download client (host: qbittorrent, port: 8080).

services:
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Etc/UTC}
    volumes:
      - prowlarr-config:/config
    ports:
      - "9696:9696"
    networks: [arrnet]
    restart: unless-stopped

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Etc/UTC}
      - WEBUI_PORT=8080
    volumes:
      - qbittorrent-config:/config
      - ./downloads:/downloads   # host dir so downloads land somewhere writable
    ports:
      - "8080:8080"
    networks: [arrnet]
    restart: unless-stopped

networks:
  arrnet:

volumes:
  prowlarr-config:
  qbittorrent-config:
